<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="25" fill="url(#bg)" />
  <g fill="white">
    <!-- Camera body -->
    <rect x="20" y="35" width="60" height="40" rx="8" />
    <!-- Flash/Button -->
    <rect x="25" y="25" width="20" height="10" rx="4" />
    <!-- Lens outer -->
    <circle cx="50" cy="55" r="14" fill="#0f172a" />
    <!-- Checkmark inside lens -->
    <path d="M43 55 L48 60 L57 48" stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
